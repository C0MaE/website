name: Multi-Branch Deploy

on:
  push:
    branches:
      - main
      - dev
      - placeholder
  pull_request:
    branches:
      - main
      - dev
      - placeholder

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/deploy || mkdir -p /home/deploy
            
            docker stop website || true
            docker rm website || true
            
            docker build -t website .
            
            docker run -d --name website -p 3000:80 website