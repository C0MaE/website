name: Deploy Placeholder

on:
  push:
    branches:
      - placeholder  # nur diese Branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/deploy/placeholder || mkdir -p /home/deploy/placeholder
            # Alten Container stoppen & löschen
            docker stop placeholder-app || true
            docker rm placeholder-app || true
            # Neues Image bauen & starten
            docker build -t placeholder-app .
            docker run -d --name placeholder-app -p 3000:80 placeholder-app