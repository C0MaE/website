<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Personal Website — fullstack developer, physics student, Rust enthusiast." />
    <title>CoMaE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root { color-scheme: dark; }

      html { scroll-behavior: smooth; }

      body {
        background-color: #09090b;
        color: #f4f4f5;
        font-family: 'Inter', system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
        overflow: hidden;
      }

      ::selection { background: rgba(124, 58, 237, 0.3); color: #a78bfa; }

      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #18181b; }
      ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 9999px; }

      /* ── Hero ── */
      #hero {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
        padding: 0 1.5rem;
      }

      /* Grid background */
      #hero::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(to right, #18181b 1px, transparent 1px),
          linear-gradient(to bottom, #18181b 1px, transparent 1px);
        background-size: 4rem 4rem;
        -webkit-mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black, transparent);
        mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black, transparent);
      }

      /* Violet glow */
      .glow {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 600px; height: 600px;
        background: rgba(124, 58, 237, 0.1);
        border-radius: 9999px;
        filter: blur(120px);
        pointer-events: none;
      }

      /* Content */
      .hero-inner {
        position: relative;
        z-index: 10;
        text-align: center;
        max-width: 48rem;
        width: 100%;
        margin: 0 auto;
      }

      .tagline {
        font-family: 'JetBrains Mono', monospace;
        color: #a78bfa;
        font-size: 0.75rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        margin-bottom: 1.5rem;
        opacity: 0;
        animation: fadeIn 0.6s ease 0ms forwards;
      }

      h1 {
        font-size: clamp(2.5rem, 8vw, 4.5rem);
        font-weight: 700;
        letter-spacing: -0.025em;
        color: #f4f4f5;
        margin-bottom: 1.5rem;
        opacity: 0;
        animation: slideUp 0.6s ease 100ms forwards;
      }

      .typewriter-wrap {
        font-family: 'JetBrains Mono', monospace;
        font-size: clamp(1rem, 3vw, 1.5rem);
        color: #a1a1aa;
        height: 2rem;
        margin-bottom: 2.5rem;
        opacity: 0;
        animation: fadeIn 0.6s ease 200ms forwards;
      }

      .cursor {
        color: #a78bfa;
        animation: blink 1s step-end infinite;
      }

      .description {
        color: #a1a1aa;
        font-size: clamp(0.9rem, 2.5vw, 1.125rem);
        max-width: 36rem;
        margin: 0 auto 3rem;
        line-height: 1.7;
        opacity: 0;
        animation: slideUp 0.6s ease 300ms forwards;
      }

      .coming-soon-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.35rem 1rem;
        border: 1px solid rgba(124, 58, 237, 0.4);
        background: rgba(124, 58, 237, 0.08);
        color: #a78bfa;
        border-radius: 9999px;
        font-size: 0.75rem;
        font-family: 'JetBrains Mono', monospace;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin-bottom: 2rem;
        opacity: 0;
        animation: fadeIn 0.6s ease 50ms forwards;
      }

      .dot {
        width: 6px; height: 6px;
        background: #7c3aed;
        border-radius: 9999px;
        animation: pulse 2s ease-in-out infinite;
      }

      .cta-group {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        opacity: 0;
        animation: slideUp 0.6s ease 400ms forwards;
      }

      @media (min-width: 640px) {
        .cta-group { flex-direction: row; }
      }

      .btn-primary {
        display: inline-block;
        padding: 0.75rem 1.5rem;
        background: #7c3aed;
        color: #fff;
        border-radius: 0.5rem;
        font-weight: 500;
        font-size: 0.875rem;
        text-decoration: none;
        transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
      }
      .btn-primary:hover {
        background: #5b21b6;
        box-shadow: 0 0 24px rgba(124, 58, 237, 0.3);
      }
      .btn-primary:active { transform: scale(0.95); }

      .btn-secondary {
        display: inline-block;
        padding: 0.75rem 1.5rem;
        border: 1px solid #3f3f46;
        color: #d4d4d8;
        border-radius: 0.5rem;
        font-weight: 500;
        font-size: 0.875rem;
        text-decoration: none;
        transition: border-color 0.2s, color 0.2s, transform 0.1s;
      }
      .btn-secondary:hover { border-color: #71717a; color: #f4f4f5; }
      .btn-secondary:active { transform: scale(0.95); }

      /* Keyframes */
      @keyframes fadeIn {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      @keyframes slideUp {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50%       { opacity: 0.5; transform: scale(0.8); }
      }
    </style>
  </head>
  <body>
    <section id="hero">
      <div class="glow"></div>

      <div class="hero-inner">
        <div class="coming-soon-badge">
          <span class="dot"></span>
          Under construction
        </div>

        <p class="tagline">Hello, world! I'm</p>

        <h1>CoMaE</h1>

        <div class="typewriter-wrap">
          <span id="typewriter"></span><span class="cursor">|</span>
        </div>

        <p class="description">
          Fullstack developer and physics student who loves building for the web.
          Passionate about Rust and crafting performant, well-designed software.
          My full portfolio is on its way. Check back soon.
        </p>

        <div class="cta-group">
          <a href="mailto:me@example.com" class="btn-primary">Get in touch</a>
          <a href="https://github.com/" target="_blank" rel="noopener" class="btn-secondary">GitHub</a>
        </div>
      </div>
    </section>

    <script>
      const words = ['Fullstack Developer', 'Rust Enthusiast', 'Physics Student', 'Web Developer'];
      let wordIndex = 0, charIndex = 0, deleting = false;
      const el = document.getElementById('typewriter');

      function type() {
        const current = words[wordIndex];
        if (!deleting) {
          el.textContent = current.slice(0, ++charIndex);
          if (charIndex === current.length) {
            deleting = true;
            setTimeout(type, 1800);
            return;
          }
        } else {
          el.textContent = current.slice(0, --charIndex);
          if (charIndex === 0) {
            deleting = false;
            wordIndex = (wordIndex + 1) % words.length;
          }
        }
        setTimeout(type, deleting ? 60 : 100);
      }

      setTimeout(type, 800);
    </script>
  </body>
</html>
